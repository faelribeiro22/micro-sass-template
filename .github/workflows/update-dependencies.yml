name: 🔄 Atualização Automática de Dependências

on:
  schedule:
    # Executa toda segunda-feira às 9h UTC (6h BRT)
    - cron: '0 9 * * 1'
  workflow_dispatch: # Permite execução manual

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: Atualizar Dependências
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 🔍 Verificar atualizações disponíveis
        id: check-updates
        run: |
          npm install -g npm-check-updates
          ncu -u --jsonUpgraded --target minor > updates.json
          
          if [ -s updates.json ] && [ "$(cat updates.json)" != "{}" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "📦 Atualizações disponíveis:"
            cat updates.json
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
            echo "✅ Todas as dependências estão atualizadas!"
          fi

      - name: 📦 Instalar dependências atualizadas
        if: steps.check-updates.outputs.has_updates == 'true'
        run: npm install

      - name: 🔨 Verificar build
        if: steps.check-updates.outputs.has_updates == 'true'
        run: npm run build

      - name: 🧪 Executar testes
        if: steps.check-updates.outputs.has_updates == 'true'
        run: npm test

      - name: 🔍 Verificar tipos TypeScript
        if: steps.check-updates.outputs.has_updates == 'true'
        run: npx tsc --noEmit

      - name: 📝 Gerar resumo de mudanças
        if: steps.check-updates.outputs.has_updates == 'true'
        id: generate-summary
        run: |
          echo "SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo "## 📦 Dependências Atualizadas" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "\`\`\`json" >> $GITHUB_OUTPUT
          cat updates.json | jq '.' >> $GITHUB_OUTPUT
          echo "\`\`\`" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "### ✅ Validações Executadas" >> $GITHUB_OUTPUT
          echo "- Build compilado com sucesso" >> $GITHUB_OUTPUT
          echo "- Testes passaram" >> $GITHUB_OUTPUT
          echo "- TypeScript sem erros de tipo" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🔀 Criar Pull Request
        if: steps.check-updates.outputs.has_updates == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore(deps): atualiza dependências npm'
          title: '🔄 Atualização Automática de Dependências'
          body: |
            ${{ steps.generate-summary.outputs.SUMMARY }}
            
            ---
            
            Esta PR foi criada automaticamente pelo workflow de atualização de dependências.
            
            **Importante:**
            - ✅ Build passou
            - ✅ Testes passaram
            - ✅ TypeScript OK
            
            Por favor, revise as mudanças antes de fazer merge.
            
            _Gerado por: GitHub Actions_
          branch: deps/auto-update
          delete-branch: true
          labels: |
            dependencies
            automated
          assignees: faelribeiro22

      - name: 📊 Upload de artefatos
        if: always() && steps.check-updates.outputs.has_updates == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-updates
          path: |
            updates.json
            package.json
            package-lock.json
          retention-days: 30
